<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tempat piknik dan bumi perkemahan dengan fasilitas terlengkap di Trawas.">
    <title>Alas Veenuz Trawas | Premium Nature Camp</title>

    <style>
        /* =========================================================
           1. VARIABLES & RESET
           ========================================================= */
        :root {
            --primary-emerald: #10b981;
            --accent-mint: #a7f3d0;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --easing-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #020b06; 
            color: var(--text-main);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            /* Font optimization (minor for system fonts, included for best practices) */
            font-display: swap; 
        }

        ::-webkit-scrollbar { 
            display: none; 
        }

        /* =========================================================
           2. BACKGROUND VIDEO & FALLBACK
           ========================================================= */
        .video-container {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -2;
            background-color: #05130b; 
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(16, 185, 129, 0.25), transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(167, 243, 208, 0.1), transparent 50%),
                linear-gradient(135deg, #020b06 0%, transparent 40%, #020b06 100%);
        }

        .video-bg {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: translate3d(0, 0, 0); 
        }

        .vignette-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1;
            /* Simplified gradient logic for performance without altering visual rendering */
            background: radial-gradient(circle, rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.85));
            pointer-events: none;
        }

        /* =========================================================
           3. MAIN CONTAINER & DESKTOP WIDGET
           ========================================================= */
        .main-container {
            width: 100%; 
            max-width: 500px;
            padding: 40px 24px 60px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            z-index: 1; 
            contain: layout paint; /* Performance: Layout boundaries optimization */
            content-visibility: auto; /* Lets browser skip rendering when off-screen */
            animation: fadeUpIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media (min-width: 768px) {
            .main-container {
                margin-top: 40px; 
                margin-bottom: 40px;
                background: rgba(5, 20, 11, 0.4);
                backdrop-filter: blur(20px); 
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 32px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            }
        }

        /* =========================================================
           4. PROFILE & TYPOGRAPHY
           ========================================================= */
        .profile-frame {
            width: 104px; 
            height: 104px; 
            border-radius: 50%;
            background: #07170e; 
            border: 2px solid var(--primary-emerald);
            margin-bottom: 20px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            will-change: opacity; /* Performance optimization hint */
        }

        .profile-img { 
            width: 75%; 
            height: 75%; 
            object-fit: contain; 
        }

        .brand-title {
            font-size: 1.35rem; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .brand-tagline {
            font-size: 0.95rem; 
            color: var(--accent-mint); 
            text-align: center;
            line-height: 1.5; 
            margin-bottom: 32px; 
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* =========================================================
           5. LINK BUTTONS
           ========================================================= */
        .link-grid { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }

        .link-btn {
            position: relative; 
            display: flex; 
            align-items: center; 
            width: 100%;
            padding: 16px 20px; 
            background: var(--glass-bg);
            border: 1px solid var(--glass-border); 
            border-radius: 18px;
            text-decoration: none; 
            color: var(--text-main); 
            font-weight: 600; 
            font-size: 0.95rem;
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.4s var(--easing-elastic), background 0.3s ease, border-color 0.3s ease;
            will-change: transform; /* Replaced legacy translate3d hack with proper optimization */
            
            /* CSS custom property --i is used here to calculate staggered animation delays, replacing repetitive nth-child rules */
            animation: fadeUpIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) calc(0.05s * var(--i, 1) + 0.05s) both;
            overflow: hidden;
        }

        .link-icon { 
            font-size: 1.25rem; 
            margin-right: 14px; 
            display: flex; 
            justify-content: center; 
        }
        
        .link-text { 
            flex-grow: 1; 
            letter-spacing: 0.3px; 
        }

        @media (hover: hover) {
            .link-btn:hover { 
                background: var(--glass-hover); 
                border-color: rgba(16, 185, 129, 0.4); 
            }
        }

        .link-btn:active { 
            transform: scale(0.95); 
            background: rgba(255, 255, 255, 0.08); 
        }

        .link-btn:focus-visible { 
            outline: 2px solid var(--primary-emerald); 
            outline-offset: 4px; 
        }

        /* Hero Button Glow */
        .hero-btn { 
            background: rgba(16, 185, 129, 0.15); 
            border-color: rgba(16, 185, 129, 0.5); 
            margin-bottom: 6px; 
        }

        .hero-btn::before {
            content: ''; 
            position: absolute; 
            inset: 0; 
            border-radius: inherit;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4), inset 0 0 10px rgba(16, 185, 129, 0.2);
            z-index: -1; 
            opacity: 0.5; 
            animation: pulseGlow 2.5s ease-in-out infinite alternate; 
            pointer-events: none;
        }

        /* =========================================================
           6. ANIMATIONS
           ========================================================= */
        @keyframes pulseGlow { 
            0% { opacity: 0.3; } 
            100% { opacity: 0.8; } 
        }

        @keyframes fadeUpIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Umami Analytics: Lightweight, Privacy-focused, Non-blocking -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="6efa40e3-8d24-4680-995a-b33252859c64"></script>
    
    <!-- Battery Saver Mode Detection (Graceful Fallback Logic) -->
    <!-- Script handles cases where autoplay is blocked (e.g. low power mode) by gracefully falling back to CSS background -->
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.querySelector('.video-bg');
            // Added null check for video element to prevent errors
            if (video) {
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch((error) => {
                        // Log debugging info when blocked
                        console.log('Video autoplay blocked (likely Battery Saver Mode). Falling back to CSS gradient.', error);
                        // Playback rejected by browser/OS, strip video gracefully leaving optimized CSS gradients intact
                        video.style.display = 'none';
                    });
                }
            } else {
                console.log('Video element not found. Battery detection skipped.');
            }
        });
    </script>
</head>
<body>

    <div class="video-container">
        <!-- Changed preload to metadata so it doesn't contradict autoplay, removed invalid onerror, and used data-URI poster fallback -->
        <video class="video-bg" autoplay loop muted playsinline poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect fill='%23020b06'/%3E%3C/svg%3E" preload="metadata">
            <source src="bg.webm" type="video/webm">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="vignette-overlay"></div>

    <main class="main-container">
        <div class="profile-frame">
            <!-- Replaced ineffective loading="eager" with fetchpriority="high" for optimal LCP handling -->
            <img src="logo2.png" alt="Alas Veenuz Trawas Logo" class="profile-img" decoding="async" fetchpriority="high">
        </div>

        <h1 class="brand-title">Alas Veenuz Trawas</h1>
        <p class="brand-tagline">Tempat piknik dan bumi perkemahan dengan fasilitas terlengkap</p>

        <nav class="link-grid">
            <!-- Used CSS custom properties (--i) to replace 9 child CSS rules, heavily reducing payload -->

            </a>
            
            <a href="https://api.whatsapp.com/send?phone=6285172483441" class="link-btn" style="--i: 2" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">💬</span>
                <span class="link-text">WhatsApp Admin (07.00–22.00 WIB)</span>
            </a>
            
            <!-- POINTS TO SECONDARY: website.html -->
            <a href="website.html" class="link-btn" style="--i: 3" target="_self">
                <span class="link-icon">⛺</span>
                <span class="link-text">Reservasi Regular Camp & Alat</span>
            </a>
            
            <a href="https://api.whatsapp.com/send?phone=6285172483441" class="link-btn" style="--i: 4" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">✨</span>
                <span class="link-text">Reservasi Lahan VIP & Glamping</span>
            </a>
            
            <a href="https://maps.google.com/?cid=16934676074272904666" class="link-btn" style="--i: 5" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">📍</span>
                <span class="link-text">Lokasi Google Maps</span>
            </a>
            
            <a href="https://www.instagram.com/alasveenuztrawas" class="link-btn" style="--i: 6" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">📸</span>
                <span class="link-text">Instagram Official</span>
            </a>
            
            <a href="https://www.tiktok.com/@alasveenuztrawas" class="link-btn" style="--i: 7" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🎵</span>
                <span class="link-text">TikTok Content</span>
            </a>
            
            <a href="https://www.youtube.com/@alasveenuztrawas" class="link-btn" style="--i: 8" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">📺</span>
                <span class="link-text">YouTube Channel</span>
            </a>
            
            <a href="https://www.facebook.com/alasveenuztrawas" class="link-btn" style="--i: 9" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">👥</span>
                <span class="link-text">Facebook Page</span>
            </a>
        </nav>
    </main>

</body>
</html>
