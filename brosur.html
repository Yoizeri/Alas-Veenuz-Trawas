<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brosur & Pricelist | Alas Veenuz Trawas</title>

    <style>
        /* =========================================================
           1. VARIABLES & RESET
           ========================================================= */
        :root {
            --primary-emerald: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: system-ui, -apple-system, sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
            background-color: #020b06;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(16, 185, 129, 0.15), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(167, 243, 208, 0.1), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(5, 30, 15, 0.8), transparent 100%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { 
            display: none; 
        }

        /* =========================================================
           2. MAIN CONTAINER & HEADER
           ========================================================= */
        .container { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 24px 24px 80px;
            content-visibility: auto; /* Performance Optimization */
        }

        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            animation: fadeInDown 0.6s ease forwards; 
        }

        .back-btn {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 44px; 
            height: 44px;
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white;
            text-decoration: none;
            /* Removed backdrop-filter for performance */
            transition: transform 0.2s;
        }

        .back-btn:active { 
            transform: scale(0.9); 
        }

        .page-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        /* =========================================================
           3. GALLERY GRID
           ========================================================= */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            contain: layout paint; /* Performance Optimization */
        }

        .gallery-item {
            width: 100%; 
            aspect-ratio: 3/4; 
            object-fit: cover; 
            border-radius: 16px;
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
            opacity: 0; 
            /* Optimized Staggered Entrance using CSS Custom Property */
            animation: fadeUpIn 0.6s calc(0.05s * var(--index, 1) + 0.05s) forwards; 
            transform: translate3d(0,0,0); 
            will-change: transform; /* Performance Optimization */
        }

        .gallery-item:active { 
            transform: scale(0.95); 
        }

        @media (hover: hover) { 
            .gallery-item:hover { 
                border-color: var(--primary-emerald); 
                transform: scale(1.03); 
            } 
        }

        /* =========================================================
           4. LIGHTBOX OVERLAY
           ========================================================= */
        .lightbox {
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(15px);
            z-index: 100; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .lightbox.active { 
            display: flex; 
            opacity: 1; 
        }

        .lightbox-img {
            max-width: 95vw; 
            max-height: 90vh; 
            object-fit: contain; 
            border-radius: 8px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.9); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform; /* Performance Optimization */
        }

        .lightbox.active .lightbox-img { 
            transform: scale(1); 
        }

        .close-hint { 
            position: absolute; 
            bottom: 30px; 
            color: rgba(255,255,255,0.6); 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            pointer-events: none; 
        }

        @keyframes fadeInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes fadeUpIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>

    <!-- Optimized Scripts moved to head with defer -->
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            let isLightboxOpen = false;

            // Null check for safe execution
            if (!lightbox || !lightboxImg) return;

            // Attached to window to be accessible by inline onclick handlers
            window.openLightbox = function(src) { 
                if (isLightboxOpen) return; // Prevent rapid opens
                isLightboxOpen = true;
                lightboxImg.src = src; 
                lightbox.classList.add('active'); 
            }

            window.closeLightbox = function() { 
                if (!isLightboxOpen) return;
                isLightboxOpen = false; // Reset immediately to prevent glitches
                lightbox.classList.remove('active'); 
                setTimeout(() => { 
                    lightboxImg.src = ''; 
                }, 300); 
            }
            
            // Keyboard Accessibility for Enter Key
            document.querySelectorAll('.gallery-item').forEach(item => { 
                item.addEventListener('keypress', function(e) { 
                    if (e.key === 'Enter') {
                        window.openLightbox(this.src); 
                    }
                }); 
            });

            // Keyboard Accessibility for Escape Key
            document.addEventListener('keydown', function(e) { 
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    window.closeLightbox(); 
                }
            });
        });
    </script>
    
    <!-- Umami Analytics: Lightweight, Privacy-focused, Non-blocking -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="6efa40e3-8d24-4680-995a-b33252859c64"></script>

</head>
<body>

    <!-- Lightbox -->
