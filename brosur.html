<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brosur & Pricelist | Alas Veenuz Trawas</title>

    <style>
        :root {
            --primary-emerald: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            /* Aesthetic Forest Canopy CSS Background (0 RAM Cost) */
            background-color: #020b06;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(16, 185, 129, 0.15), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(167, 243, 208, 0.1), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(5, 30, 15, 0.8), transparent 100%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { display: none; }

        .container {
            width: 100%; max-width: 800px; margin: 0 auto;
            padding: 24px 20px 80px;
        }

        /* Top Navigation Bar */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease forwards;
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; text-decoration: none;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            font-size: 1.2rem; transition: transform 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }
        .back-btn:focus-visible { outline: 2px solid var(--primary-emerald); }

        .page-title {
            font-size: 1.2rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive Masonry/Grid Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            width: 100%; 
            /* Aspect-ratio prevents layout shift (Zero CLS) when Lazy Loading */
            aspect-ratio: 3/4; 
            object-fit: cover; border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
            opacity: 0; animation: fadeUpIn 0.6s forwards;
            /* Force GPU acceleration */
            transform: translate3d(0,0,0);
            will-change: transform;
        }

        /* Smart TV D-Pad Focus */
        .gallery-item:focus-visible {
            outline: 3px solid var(--primary-emerald);
            outline-offset: 2px;
            transform: scale(1.03);
        }

        .gallery-item:active { transform: scale(0.95); }
        
        @media (hover: hover) {
            .gallery-item:hover { border-color: var(--primary-emerald); transform: scale(1.02); }
        }

        /* Staggered entrance animation for all 14 images */
        .gallery-grid img:nth-child(1) { animation-delay: 0.1s; }
        .gallery-grid img:nth-child(2) { animation-delay: 0.2s; }
        .gallery-grid img:nth-child(3) { animation-delay: 0.3s; }
        .gallery-grid img:nth-child(4) { animation-delay: 0.4s; }
        .gallery-grid img:nth-child(5) { animation-delay: 0.5s; }
        .gallery-grid img:nth-child(6) { animation-delay: 0.6s; }
        .gallery-grid img:nth-child(7) { animation-delay: 0.7s; }
        .gallery-grid img:nth-child(8) { animation-delay: 0.8s; }
        .gallery-grid img:nth-child(9) { animation-delay: 0.9s; }
        .gallery-grid img:nth-child(10) { animation-delay: 1.0s; }
        .gallery-grid img:nth-child(11) { animation-delay: 1.1s; }
        .gallery-grid img:nth-child(12) { animation-delay: 1.2s; }
        .gallery-grid img:nth-child(13) { animation-delay: 1.3s; }
        .gallery-grid img:nth-child(14) { animation-delay: 1.4s; }

        /* The Lightbox (Image Viewer) Overlay */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            display: none; 
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex; opacity: 1;
        }

        .lightbox-img {
            max-width: 95vw; max-height: 90vh;
            object-fit: contain; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active .lightbox-img { transform: scale(1); }

        .close-hint {
            position: absolute; bottom: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem; letter-spacing: 1px;
            pointer-events: none;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUpIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <!-- Safely goes back to the main page -->
            <a href="index.html" class="back-btn" aria-label="Kembali">
                <span>←</span>
            </a>
            <h1 class="page-title">Brosur & Harga</h1>
            <div style="width: 44px;"></div> <!-- Empty div to perfectly center the title -->
        </header>

        <!-- Gallery Grid (14 WebP Images + Advanced SEO Alt Optimization) -->
        <main class="gallery-grid">
            <img src="1.webp" alt="Sewa Lahan Campervan Alas Veenuz Trawas - Tiket Weekday & Weekend" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">

            <img src="3.webp" alt="Price List Tiket Masuk Wisata, Playground & Camping Alas Veenuz Trawas" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="4.webp" alt="Paket Forest Glamping Alas Veenuz Trawas - Fasilitas Tenda & Kitchen" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="5.webp" alt="Paket Nature Glamping Alas Veenuz Trawas - Kapasitas 2-4 Orang" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="6.webp" alt="Sewa Lahan Glamping Alas Veenuz Trawas - Kavling Satu Tenda" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="7.webp" alt="Family Camp Package Alas Veenuz Trawas - Paket A, B, C" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="8.webp" alt="Paket Outbound Fun Game Alas Veenuz Trawas - Hemat, Medium, VIP" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="9.webp" alt="Camp Rate & Cara Reservasi Tiket Alas Veenuz Trawas" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="10.webp" alt="Brosur Tentang Kami - Mengapa Memilih Alas Veenuz Trawas" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="11.webp" alt="Tiket Masuk Wisata Alam Terlengkap Alas Veenuz Trawas" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="12.webp" alt="Picnic Package Alas Veenuz Trawas - Sewa Tikar & Keranjang" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="13.webp" alt="Persewaan Perlengkapan Berkemah & Peralatan Memasak Alas Veenuz" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="14.webp" alt="Fasilitas Cottage Alas Veenuz Trawas - Tarif Weekday & Weekend" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
        </main>
    </div>

    <!-- The Lightbox Overlay -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img src="" alt="View" class="lightbox-img" id="lightbox-img">
        <span class="close-hint">Tap anywhere to close</span>
    </div>

    <!-- Vanilla JS Mechanics -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // Safely passes the image source
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }

        // Keyboard Access: Enter to open
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { openLightbox(this.src); }
            });
        });

        // Keyboard Access: Escape to close lightbox (Pro UX Addition)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
