<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brosur & Pricelist | Alas Veenuz Trawas</title>

    <style>
        /* =========================================================
           1. VARIABLES & RESET
           ========================================================= */
        :root {
            --primary-emerald: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: system-ui, -apple-system, sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
            background-color: #020b06;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(16, 185, 129, 0.15), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(167, 243, 208, 0.1), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(5, 30, 15, 0.8), transparent 100%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { 
            display: none; 
        }

        /* =========================================================
           2. MAIN CONTAINER & HEADER
           ========================================================= */
        .container { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 24px 24px 80px; 
        }

        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            animation: fadeInDown 0.6s ease forwards; 
        }

        .back-btn {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 44px; 
            height: 44px;
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white;
            text-decoration: none; 
            backdrop-filter: blur(10px); 
            transition: transform 0.2s;
        }

        .back-btn:active { 
            transform: scale(0.9); 
        }

        .page-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        /* =========================================================
           3. GALLERY GRID
           ========================================================= */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            width: 100%; 
            aspect-ratio: 3/4; 
            object-fit: cover; 
            border-radius: 16px;
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
            opacity: 0; 
            animation: fadeUpIn 0.6s forwards; 
            transform: translate3d(0,0,0); 
            will-change: transform;
        }

        .gallery-item:active { 
            transform: scale(0.95); 
        }

        @media (hover: hover) { 
            .gallery-item:hover { 
                border-color: var(--primary-emerald); 
                transform: scale(1.03); 
            } 
        }

        /* =========================================================
           4. STAGGERED ENTRANCE ANIMATIONS
           ========================================================= */
        .gallery-grid img:nth-child(1)  { animation-delay: 0.1s; } 
        .gallery-grid img:nth-child(2)  { animation-delay: 0.15s; }
        .gallery-grid img:nth-child(3)  { animation-delay: 0.2s; } 
        .gallery-grid img:nth-child(4)  { animation-delay: 0.25s; }
        .gallery-grid img:nth-child(5)  { animation-delay: 0.3s; } 
        .gallery-grid img:nth-child(6)  { animation-delay: 0.35s; }
        .gallery-grid img:nth-child(7)  { animation-delay: 0.4s; } 
        .gallery-grid img:nth-child(8)  { animation-delay: 0.45s; }
        .gallery-grid img:nth-child(9)  { animation-delay: 0.5s; } 
        .gallery-grid img:nth-child(10) { animation-delay: 0.55s; }
        .gallery-grid img:nth-child(11) { animation-delay: 0.6s; } 
        .gallery-grid img:nth-child(12) { animation-delay: 0.65s; }
        .gallery-grid img:nth-child(13) { animation-delay: 0.7s; } 
        .gallery-grid img:nth-child(14) { animation-delay: 0.75s; }

        /* =========================================================
           5. LIGHTBOX OVERLAY
           ========================================================= */
        .lightbox {
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(15px);
            z-index: 100; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .lightbox.active { 
            display: flex; 
            opacity: 1; 
        }

        .lightbox-img {
            max-width: 95vw; 
            max-height: 90vh; 
            object-fit: contain; 
            border-radius: 8px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.9); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active .lightbox-img { 
            transform: scale(1); 
        }

        .close-hint { 
            position: absolute; 
            bottom: 30px; 
            color: rgba(255,255,255,0.6); 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            pointer-events: none; 
        }

        @keyframes fadeInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes fadeUpIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>

    <!-- Umami Analytics: Lightweight, Privacy-focused, Non-blocking -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="MASUKKAN-ID-UMAMI-KAMU-DISINI"></script>

</head>
<body>

    <div class="container">
        <header class="header">
            <!-- POINTS BACK TO PRIMARY BRIDGE: index.html -->
            <a href="index.html" class="back-btn" aria-label="Kembali" target="_self">
                <span>←</span>
            </a>
            <h1 class="page-title">Brosur & Harga</h1>
            <div style="width: 44px;"></div>
        </header>

        <main class="gallery-grid">
            <img src="1.webp" alt="Sewa Lahan Campervan" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="2.webp" alt="Paket BBQ Grill Oh My Beef" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="3.webp" alt="Price List Tiket Masuk" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="4.webp" alt="Paket Forest Glamping" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="5.webp" alt="Paket Nature Glamping" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="6.webp" alt="Sewa Lahan Glamping" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="7.webp" alt="Family Camp Package" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="8.webp" alt="Paket Outbound Fun Game" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="9.webp" alt="Camp Rate & Cara Reservasi" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="10.webp" alt="Tentang Kami Alas Veenuz" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="11.webp" alt="Tiket Masuk Wisata Alam" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="12.webp" alt="Picnic Package Alas Veenuz" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="13.webp" alt="Persewaan Perlengkapan Berkemah" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
            <img src="14.webp" alt="Fasilitas Cottage" class="gallery-item" loading="lazy" decoding="async" tabindex="0" onclick="openLightbox(this.src)">
        </main>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img src="" alt="View" class="lightbox-img" id="lightbox-img">
        <span class="close-hint">Tap anywhere to close</span>
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) { 
            lightboxImg.src = src; 
            lightbox.classList.add('active'); 
        }

        function closeLightbox() { 
            lightbox.classList.remove('active'); 
            setTimeout(() => { 
                lightboxImg.src = ''; 
            }, 300); 
        }
        
        // Keyboard Accessibility for Enter Key
        document.querySelectorAll('.gallery-item').forEach(item => { 
            item.addEventListener('keypress', function(e) { 
                if (e.key === 'Enter') {
                    openLightbox(this.src); 
                }
            }); 
        });

        // Keyboard Accessibility for Escape Key
        document.addEventListener('keydown', function(e) { 
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox(); 
            }
        });
    </script>
</body>
</html>
